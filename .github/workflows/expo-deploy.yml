name: Expo Deployment

on:
  workflow_call:
    inputs:
      branch_name:
        required: true
        type: string
      project_root:
        required: false
        type: string
        default: "."
      publish_artifact:
        required: false
        type: string
        default: "true"
    secrets:
      EXPO_TOKEN:
        required: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project_root }}
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Application Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --if-present

  eas-deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project_root }}
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Application Dependencies
        run: npm ci

      - name: Determine Target Profile Environment
        id: select-env
        run: |
          if [[ "${{ inputs.branch_name }}" == "refs/heads/release" || "${{ inputs.branch_name }}" == "refs/heads/main" ]]; then
            echo "profile=production" >> $GITHUB_OUTPUT
            echo "should_submit=${{ inputs.publish_artifact }}" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.branch_name }}" == "refs/heads/qa" ]]; then
            echo "profile=qa" >> $GITHUB_OUTPUT
            echo "should_submit=false" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.branch_name }}" == "refs/heads/test" ]]; then
            echo "profile=testing" >> $GITHUB_OUTPUT
            echo "should_submit=false" >> $GITHUB_OUTPUT
          else
            echo "profile=development" >> $GITHUB_OUTPUT
            echo "should_submit=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Conditionally Submit to App Stores
        run: |
          if [ "${{ steps.select-env.outputs.should_submit }}" = "true" ]; then
            echo "🚀 Compiling binary and submitting directly to app stores..."
            eas build --platform all --profile ${{ steps.select-env.outputs.profile }} --auto-submit --non-interactive
          else
            echo "📦 Compiling binary only (skipping automatic store publication)..."
            eas build --platform all --profile ${{ steps.select-env.outputs.profile }} --non-interactive
          fi
